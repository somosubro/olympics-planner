<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Olympics Schedule Planner</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #9aa8b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .card {
      max-width: 28rem;
      width: 100%;
      background: var(--card);
      border-radius: 12px;
      padding: 2rem 1.75rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      line-height: 1.25;
    }
    p.lead {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 1rem 1.25rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }
    .fine {
      margin: 1.25rem 0 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .fine a { color: #93c5fd; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Olympics Schedule Planner</h1>
    <p class="lead">
      Explore LA28 sessions and build validated plans in ChatGPT. Tap the button to open the Custom GPT (ChatGPT account required).
    </p>
    <!-- Replace href with your GPT link from ChatGPT → My GPTs → your GPT → Copy link -->
    <a class="btn" href="https://chatgpt.com/share/69d55fa4-e2c4-83e8-890e-355eca9d7a9a">Open in ChatGPT</a>
    <p class="fine">
      <a href="gpt/privacy-policy.html">Privacy policy</a>
      · Hosted on GitHub Pages
    </p>
  </main>
</body>
</html>
