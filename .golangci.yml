# golangci-lint v2 format — see https://golangci-lint.run/docs/configuration/file
version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - revive
    - misspell
    - gocritic

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

issues:
  exclude-use-default: false
