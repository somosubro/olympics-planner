# Cloud Build: build Docker image, push to Artifact Registry, deploy to Cloud Run.
# Used with a GitHub trigger (see docs/hosting-github-deploy.md).
#
# Substitutions (override in the trigger or with --substitutions):
#   _REGION  = Cloud Run + Artifact Registry location (e.g. us-central1)
#   _SERVICE = Cloud Run service name
#   _REPO    = Artifact Registry Docker repository id (create once in that region)

substitutions:
  _REGION: us-central1
  _SERVICE: olympics-schedule-planner-api
  _REPO: olympics-schedule-planner

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
